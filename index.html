<!DOCTYPE html>
<html>
<head>
  <title>freddie randle</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #39ff14;
      font-family: "Courier New", Consolas, monospace;
      overflow: hidden;
    }

    /* CRT wrapper */
    .crt {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: pre;
    }

    /* MAIN TEXT BOX */
    .box {
      position: relative;
      z-index: 2;
      border-right: 2px solid #39ff14;
      animation: blink 0.8s infinite;

      /* 🔥 RESPONSIVE SCALING */
      font-size: clamp(12px, 2.5vw, 22px);
      line-height: 1.2;
      padding: 20px;

      text-shadow: 0 0 6px #39ff14, 0 0 18px #39ff14;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* scanlines */
    .crt::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.04) 1px,
        rgba(0,0,0,0.05) 3px,
        rgba(0,0,0,0.05) 5px
      );
      pointer-events: none;
    }

    /* glow vignette */
    .crt::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 120px rgba(0,255,0,0.12);
      pointer-events: none;
    }

    /* 🔥 MOBILE BOOST */
    @media (max-width: 600px) {
      .box {
        font-size: clamp(16px, 5vw, 28px);
        padding: 30px;
      }
    }

    /* optional tablet boost */
    @media (min-width: 601px) and (max-width: 1024px) {
      .box {
        font-size: clamp(14px, 3vw, 24px);
      }
    }
  </style>
</head>

<body>

<div class="crt">
  <div id="screen" class="box"></div>
</div>

<script>

const frames = [
"Initializing...\n",

" ___           _    _ _       ___              _ _     \n" +
"| __| _ ___ __| |__| (_)___  | _ \\__ _ _ _  __| | |___ \n" +
"| _| '_/ -_) _` / _` | / -_) |   / _` | ' \\/ _` | / -_)\n" +
"|_||_| \\___\\__,_\\__,_|_\\___| |_|_\\__,_|_|_|\\__,_|_\\___|\n\n" +


";-.          ___,\n" +
" `.\\_...._/`.-\"`\n" +
"   \\        /      ,\n" +
"   /()   () \\    .' `-._\n" +
"  |)  .    ()\\  /   _.'\n" +
"   \\  -'-     ,; '. <\n" +
"    ;.__     ,;|   > \\\n" +
"   / ,    / ,  |.-'.-'\n" +
"  (_/    (_/ ,;|.<`\n" +
"   \\    ,     ;-`\n" +
"    >   \\    / \n" +
"   (_,-'`> .'\n" +
"         (_,'\n",

"###########################\n" +
"#      SYSTEM ONLINE      #\n" +
"#   USER: FREDDIE RANDLE  #\n" +
"###########################\n"
];

let i = 0;
let j = 0;
let current = "";

function typeFrame() {
  if (i >= frames.length) i = 0;

  let frame = frames[i];

  if (j < frame.length) {
    current += frame[j];
    document.getElementById("screen").innerText = current;
    j++;
    setTimeout(typeFrame, 18);
  } else {
    setTimeout(() => {
      i++;
      j = 0;
      current = "";
      typeFrame();
    }, 1200);
  }
}

typeFrame();

</script>

</body>
</html>
