<!DOCTYPE html>
<html>
<head>
  <title>freddie randle</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #39ff14;
      font-family: "Courier New", Consolas, monospace;
      overflow: hidden;
    }

    /* CRT screen glow */
    .crt {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: pre;
      font-size: 14px;
      padding: 20px;
      text-shadow: 0 0 5px #39ff14, 0 0 15px #39ff14;
      animation: flicker 0.15s infinite;
    }

    /* flicker effect */
    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.95; }
      100% { opacity: 1; }
    }

    /* scanlines overlay */
    .crt::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
    }

    /* subtle screen curvature feel */
    .crt::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 100px rgba(0,255,0,0.1);
      pointer-events: none;
    }

    .box {
      position: relative;
      z-index: 2;
      border-right: 2px solid #39ff14;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }
  </style>
</head>

<body>

<div class="crt">
  <div id="screen" class="box"></div>
</div>

<script>

const frames = [
"Initializing...\n",

" ___           _    _ _       ___              _ _     \n" +
"| __| _ ___ __| |__| (_)___  | _ \\__ _ _ _  __| | |___ \n" +
"| _| '_/ -_) _` / _` | / -_) |   / _` | ' \\/ _` | / -_)\n" +
"|_||_| \\___\\__,_\\__,_|_\\___| |_|_\\__,_|_|_|\\__,_|_\\___|\n\n" +
"freddie randle\n",

";-.          ___,\n" +
" `.\\_...._/`.-\"`\n" +
"   \\        /      ,\n" +
"   /()   () \\    .' `-._\n" +
"  |)  .    ()\\  /   _.'\n" +
"   \\  -'-     ,; '. <\n" +
"    ;.__     ,;|   > \\\n" +
"   / ,    / ,  |.-'.-'\n" +
"  (_/    (_/ ,;|.<`\n" +
"   \\    ,     ;-`\n" +
"    >   \\    / \n" +
"   (_,-'`> .'\n" +
"         (_,'\n",

"###########################\n" +
"#      SYSTEM ONLINE      #\n" +
"#   USER: FREDDIE RANDLE  #\n" +
"###########################\n"
];

let i = 0;
let j = 0;
let current = "";

function typeFrame() {
  if (i >= frames.length) i = 0;

  let frame = frames[i];

  if (j < frame.length) {
    current += frame[j];
    document.getElementById("screen").innerText = current;
    j++;
    setTimeout(typeFrame, 18);
  } else {
    setTimeout(() => {
      i++;
      j = 0;
      current = "";
      typeFrame();
    }, 1200);
  }
}

typeFrame();

</script>

</body>
</html>
